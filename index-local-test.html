<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>本地模型测试 v3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    h1 { font-size: 28px; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    .card { background: #1a1a1a; border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #2a2a2a; font-size: 15px; }
    .item:last-child { border-bottom: none; }
    .item .label { color: #888; }
    .item .val { font-weight: 600; color: #fff; }
    .item .val.ok { color: #34C759; }
    .item .val.fail { color: #ff3b30; }
    .item .val.loading { color: #FF9500; }
    .progress-wrap { margin-top: 8px; }
    .progress-bar { width: 100%; height: 6px; background: #2a2a2a; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #007AFF; border-radius: 3px; width: 0%; transition: width 0.5s; }
    .status { margin-top: 20px; text-align: center; font-size: 15px; color: #888; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
    .status.error { color: #ff6b6b; }
    .status.success { color: #34C759; }
    .dots { display: flex; gap: 6px; }
    .dots span { width: 8px; height: 8px; background: #007AFF; border-radius: 50%; animation: pulse 1.2s infinite ease-in-out; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(0.8)}50%{opacity:1;transform:scale(1)} }
    .btn { display: none; width: 100%; margin-top: 16px; padding: 16px; background: #007AFF; color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
    .btn:active { opacity: 0.7; }
    .cam-wrap { width: 100%; margin-top: 16px; display: none; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; }
    .cam-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .answer { display: none; margin-top: 12px; padding: 14px; background: #111; border-radius: 10px; font-size: 15px; line-height: 1.6; color: #ddd; white-space: pre-wrap; }
    .log { margin-top: 16px; padding: 12px; background: #111; border-radius: 10px; font-size: 12px; color: #666; font-family: monospace; max-height: 120px; overflow-y: auto; text-align: left; white-space: pre-wrap; display: none; }
  </style>
</head>
<body>

<h1>🤖 本地模型测试 v3</h1>
<p class="subtitle">iPhone 16 Pro · iOS 26 · Transformers.js</p>

<div class="card">
  <div class="item">
    <span class="label">WebGPU</span>
    <span class="val loading" id="gpu">检测中...</span>
  </div>
  <div class="item">
    <span class="label">Transformers.js</span>
    <span class="val loading" id="tfjs">检测中...</span>
  </div>
  <div class="item">
    <span class="label">摄像头</span>
    <span class="val loading" id="cam">检测中...</span>
  </div>
  <div class="item">
    <span class="label">模型</span>
    <span class="val" id="model">moondream2-quantized</span>
  </div>
  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
  </div>
</div>

<div class="status loading" id="status">
  <div class="dots"><span></span><span></span><span></span></div>
  <span id="statusText">正在初始化...</span>
</div>

<div class="log" id="log"></div>

<div class="cam-wrap" id="camWrap">
  <video id="video" autoplay playsinline muted></video>
</div>
<button class="btn" id="askBtn">📷 拍照提问</button>
<div class="answer" id="answer"></div>

<script>
const $ = id => document.getElementById(id);

function log(msg) {
  const el = $('log');
  el.style.display = 'block';
  el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function set(id, text, cls) {
  const el = $(id);
  el.textContent = text;
  el.className = 'val ' + (cls || '');
}

function setStatus(text, type) {
  const t = $('statusText');
  const s = $('status');
  t.textContent = text;
  if (type === 'success') {
    s.className = 'status success';
    s.innerHTML = '<span>✅</span><span>' + text + '</span>';
  } else if (type === 'error') {
    s.className = 'status error';
    s.innerHTML = '<span>❌</span><span>' + text + '</span>';
  } else {
    s.className = 'status loading';
    s.innerHTML = '<div class="dots"><span></span><span></span><span></span></div><span>' + text + '</span>';
  }
}

log('=== 本地模型测试 v3 ===');
log('开始检测环境...');

// Check WebGPU
const gpuOk = !!navigator.gpu;
set('gpu', gpuOk ? '✅ 支持' : '❌ 不支持', gpuOk ? 'ok' : 'fail');
log('WebGPU: ' + (gpuOk ? 'OK' : 'FAIL'));

// Check camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
  .then(s => { s.getTracks().forEach(t => t.stop()); set('cam', '✅ 可用', 'ok'); log('Camera: OK'); })
  .catch(e => { set('cam', '❌ 不可用', 'fail'); log('Camera: FAIL - ' + e.message); });

// Load Transformers.js from multiple CDN sources
async function loadTransformers() {
  if (!gpuOk) {
    set('tfjs', '❌ WebGPU 不可用', 'fail');
    setStatus('WebGPU 不支持，无法运行', 'error');
    return;
  }

  set('tfjs', '加载中...', 'loading');
  setStatus('正在加载 Transformers.js...');
  log('尝试加载 Transformers.js...');

  // Try multiple CDN sources
  const cdnList = [
    { url: 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1', name: 'jsDelivr' },
    { url: 'https://unpkg.com/@xenova/transformers@2.17.1', name: 'unpkg' },
    { url: 'https://registry.npmmirror.com/@xenova/transformers@2.17.1', name: 'npmmirror' }
  ];

  let transformers = null;
  for (const cdn of cdnList) {
    try {
      log('尝试 CDN: ' + cdn.name + '...');
      setStatus('尝试 ' + cdn.name + '...');
      transformers = await import(cdn.url + '/dist/transformers.js');
      log('CDN 成功: ' + cdn.name);
      break;
    } catch(e) {
      log('CDN 失败: ' + cdn.name + ' - ' + e.message.slice(0, 60));
    }
  }

  if (!transformers) {
    set('tfjs', '❌ CDN 全部失败', 'fail');
    setStatus('所有 CDN 都无法访问（可能是网络问题）', 'error');
    return;
  }

  set('tfjs', '✅ 已加载', 'ok');
  log('Transformers.js 加载成功！');
  await runMoondream(transformers);
}

async function runMoondream(tf) {
  const { pipeline, env } = tf;
  setStatus('正在加载模型（约 500MB）...', 'loading');
  log('开始下载 Moondream2 模型...');

  // Use HuggingFace CDN mirror
  env.allowLocalModels = false;
  env.useBrowserCache = true;

  $('progressWrap').style.display = 'block';
  let lastPct = 0;

  try {
    const captioner = await pipeline(
      'image-to-text',
      'Xenova/moondream2',
      {
        progress_callback: (info) => {
          if (info.status === 'progress' && info.progress !== undefined) {
            const pct = Math.round(info.progress);
            if (pct !== lastPct) {
              lastPct = pct;
              $('progressBar').style.width = pct + '%';
              setStatus('下载中 ' + pct + '%', 'loading');
              if (info.file) log('下载: ' + info.file);
            }
          } else if (info.status) {
            log(info.status + (info.file ? ' - ' + info.file : ''));
          }
        }
      }
    );

    set('tfjs', '✅ 模型就绪', 'ok');
    $('progressBar').style.width = '100%';
    setStatus('🎉 模型加载成功！可以离线使用！', 'success');
    log('模型加载完成！');

    $('camWrap').style.display = 'block';
    $('askBtn').style.display = 'block';

    const video = $('video');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    log('摄像头已启动');

    $('askBtn').onclick = async () => {
      const answer = $('answer');
      answer.style.display = 'block';
      answer.textContent = '🤖 推理中...';
      $('askBtn').disabled = true;
      log('开始推理...');

      try {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imgData = canvas.toDataURL('image/jpeg', 0.8);

        // Convert base64 to blob for transformers
        const response = await fetch(imgData);
        const blob = await response.blob();

        log('图片已捕获，开始分析...');
        const result = await captioner(blob, { prompt: '请简单描述这张图片，用中文回答' });
        answer.textContent = result[0].generated_text;
        log('推理完成: ' + result[0].generated_text.slice(0, 50));
      } catch(e2) {
        answer.textContent = '❌ 推理失败: ' + e2.message;
        log('推理错误: ' + e2.message);
      }
      $('askBtn').disabled = false;
    };

  } catch(e) {
    set('tfjs', '❌ 模型加载失败', 'fail');
    $('progressWrap').style.display = 'none';
    setStatus('模型加载失败: ' + e.message.slice(0, 80), 'error');
    log('ERROR: ' + e.message);
  }
}

loadTransformers();
</script>
</body>
</html>
