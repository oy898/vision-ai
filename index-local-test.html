<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>本地模型测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
    .card { background: #1a1a1a; border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #2a2a2a; font-size: 15px; }
    .item:last-child { border-bottom: none; }
    .item .label { color: #888; }
    .item .val { font-weight: 600; color: #fff; }
    .item .val.ok { color: #34C759; }
    .item .val.fail { color: #ff3b30; }
    .item .val.testing { color: #FF9500; }
    .progress-bar { width: 100%; height: 6px; background: #2a2a2a; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: #007AFF; border-radius: 3px; width: 0%; transition: width 0.3s; }
    .status { margin-top: 24px; text-align: center; font-size: 15px; color: #888; min-height: 50px; }
    .status.error { color: #ff6b6b; }
    .status.success { color: #34C759; }
    .btn { display: block; width: 100%; margin-top: 16px; padding: 16px; background: #007AFF; color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
    .btn:active { opacity: 0.7; }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .cam-preview { width: 100%; border-radius: 12px; margin-top: 16px; display: none; background: #000; }
    .cam-preview video { width: 100%; border-radius: 12px; }
    .answer { margin-top: 12px; padding: 14px; background: #111; border-radius: 10px; font-size: 15px; line-height: 1.6; color: #ddd; display: none; white-space: pre-wrap; }
  </style>
</head>
<body>

<h1>🤖 本地模型测试</h1>
<p class="subtitle">iPhone 16 Pro · iOS 26</p>

<div class="card">
  <div class="item">
    <span class="label">WebGPU 支持</span>
    <span class="val" id="webgpu">检测中...</span>
  </div>
  <div class="item">
    <span class="label">WebLLM 引擎</span>
    <span class="val" id="webllm">检测中...</span>
  </div>
  <div class="item">
    <span class="label">本地模型</span>
    <span class="val" id="model">—</span>
  </div>
  <div class="item">
    <span class="label">下载进度</span>
    <span class="val" id="progress">—</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>

  <div class="item">
    <span class="label">摄像头</span>
    <span class="val" id="camera">检测中...</span>
  </div>
</div>

<div class="status" id="status">正在初始化检测...</div>

<div class="card" style="margin-top: 16px; display: none;" id="chatCard">
  <div class="cam-preview" id="camPreview">
    <video id="video" autoplay playsinline muted></video>
  </div>
  <button class="btn" id="askBtn" disabled>📷 拍照提问</button>
  <div class="answer" id="answer"></div>
</div>

<script type="module">
import * as webllm from 'https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@latest/+esm';

const $ = id => document.getElementById(id);

let engine = null;
let progressCallback = null;

// Step 1: Check WebGPU
async function checkWebGPU() {
  if (navigator.gpu) {
    $('webgpu').textContent = '✅ 支持';
    $('webgpu').className = 'val ok';
    return true;
  } else {
    $('webgpu').textContent = '❌ 不支持';
    $('webgpu').className = 'val fail';
    return false;
  }
}

// Step 2: Check camera
async function checkCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    stream.getTracks().forEach(t => t.stop());
    $('camera').textContent = '✅ 可用';
    $('camera').className = 'val ok';
    return true;
  } catch(e) {
    $('camera').textContent = '❌ 不可用';
    $('camera').className = 'val fail';
    return false;
  }
}

// Step 3: Try loading WebLLM
async function tryWebLLM() {
  $('status').textContent = '⏳ 正在加载 WebLLM 引擎...';
  $('webllm').textContent = '加载中...';
  $('webllm').className = 'val testing';

  // Use a small text model first to test if WebLLM works
  // Then we know if the phone can handle it
  const testModel = 'Llama-3.2-3B-Instruct-q4f16_1-MLC';

  try {
    $('status').textContent = '🚀 准备下载模型（首次需下载约2GB）...';
    $('model').textContent = testModel;
    $('model').className = 'val testing';

    progressCallback = (progress) => {
      const pct = Math.round(progress.progress * 100);
      $('progress').textContent = pct + '%';
      $('progressBar').style.width = pct + '%';
      const loaded = (progress.progress * 2).toFixed(1);
      $('status').textContent = `📥 下载模型中... ${loaded} / 2.0 GB`;
    };

    engine = await webllm.CreateEngine(testModel, {
      initProgressCallback: progressCallback
    });

    $('webllm').textContent = '✅ 就绪';
    $('webllm').className = 'val ok';
    $('progress').textContent = '100%';
    $('progressBar').style.width = '100%';
    $('status').textContent = '🎉 本地模型加载成功！可以离线使用！';
    $('status').className = 'status success';
    $('chatCard').style.display = 'block';

    await setupChat(engine);
    return true;
  } catch(e) {
    $('webllm').textContent = '❌ 失败';
    $('webllm').className = 'val fail';
    $('model').textContent = '—';
    $('progress').textContent = '—';
    $('progressBar').style.width = '0%';
    $('status').textContent = '⚠️ ' + e.message;
    $('status').className = 'status error';
    return false;
  }
}

let videoStream = null;

async function setupChat(eng) {
  const video = $('video');
  const camPreview = $('camPreview');
  const askBtn = $('askBtn');
  const answer = $('answer');

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = videoStream;
    camPreview.style.display = 'block';
  } catch(e) {
    answer.textContent = '⚠️ 摄像头启动失败：' + e.message;
    answer.style.display = 'block';
  }

  askBtn.disabled = false;
  askBtn.onclick = async () => {
    // Capture frame
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const imageData = canvas.toDataURL('image/jpeg', 0.8);

    answer.style.display = 'block';
    answer.textContent = '🤖 推理中...';

    try {
      const reply = await eng.chat.completions.create({
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: '请描述这张图片' },
            { type: 'image_url', image_url: { url: imageData } }
          ]
        }]
      });
      answer.textContent = reply.choices[0].message.content;
    } catch(e2) {
      answer.textContent = '❌ 推理失败：' + e2.message;
    }
  };
}

// Run all checks
$('status').textContent = '⏳ 正在检测系统环境...';

const gpuOk = await checkWebGPU();
await checkCamera();
const llmOk = await tryWebLLM();

if (!gpuOk) {
  $('status').textContent = '❌ 当前浏览器不支持 WebGPU，本地模型无法运行';
  $('status').className = 'status error';
}
</script>
</body>
</html>
